<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP3 - Programación</title>
    <link rel="stylesheet" href="style.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
</head>
<body>
    <header>
        <h1>Trabajo Practico - Programación</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="flexbox.html">Ej 1: Flexbox</a></li>
                <li><a href="personas.html">Ej 2: Personas (JS)</a></li>
                <li><a href="react.html">Ej 3: Personas (React)</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="root"></div>
        </main>
    <script type="text/babel">
        function App() {
            const [personas, setPersonas] = React.useState([]);
            const [form, setForm] = React.useState({
                nombre: '', apellido: '', edad: '', altura: '', peso: ''
            });

            const manejarCambio = (e) => {
                setForm({ ...form, [e.target.name]: e.target.value });
            };

            return (
                <div>
                    <h2>Registro de Personas (React)</h2>
                    <form>
                        <input name="nombre" value={form.nombre} onChange={manejarCambio} placeholder="Nombre" required />
                        <input name="apellido" value={form.apellido} onChange={manejarCambio} placeholder="Apellido" required />
                        <input name="edad" type="number" value={form.edad} onChange={manejarCambio} placeholder="Edad" required />
                        <input name="altura" type="number" step="0.01" value={form.altura} onChange={manejarCambio} placeholder="Altura (ej: 1.75)" required />
                        <input name="peso" type="number" value={form.peso} onChange={manejarCambio} placeholder="Peso (kg)" required />
                        <button type="submit">Agregar</button>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura (m)</th>
                                <th>Peso (kg)</th>
                                <th>IMC</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
