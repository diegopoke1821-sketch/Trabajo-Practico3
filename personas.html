<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP3 - Programación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Trabajo Practico - Programación</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="flexbox.html">Ej 1: Flexbox</a></li>
                <li><a href="personas.html">Ej 2: Personas (JS)</a></li>
                <li><a href="react.html">Ej 3: Personas (React)</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Registro de Personas</h2>
        <form id="form-personas">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="number" id="edad" placeholder="Edad" required>
            <input type="number" id="altura" placeholder="Altura (ej: 1.75)" step="0.01" required>
            <input type="number" id="peso" placeholder="Peso (kg)" required>
            <button type="submit">Agregar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Edad</th>
                    <th>Altura (m)</th>
                    <th>Peso (kg)</th>
                    <th>IMC</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                </tbody>
        </table>
        </main>
</body>
</html>
